# Mutation-audit registry for the lifecycle layer
# (artifact_access.go, recovery.go, plus parallel atomic-emission
# coverage for provision_escrow.go and exchange/identity/
# mapping_escrow_v2.go).
#
# Phase C Group 6.2 — composition-layer audit. Six switches gate
# the lifecycle-layer integrity checks plus a cross-registered
# entry for the Group-3 muEnableCommitmentEmissionAtomic that the
# registry covers via per-gate source_file overrides.
#
# Phase C Group 6.3 — extends discipline one layer deeper onto the
# internal membership checks CheckGrantAuthorization performs. The
# existing muEnableGrantAuthorizationCheck (Group 6.2) gates the
# dispatch into the function; Group 6.3 adds two switches that gate
# the internal authority-set membership check and the internal
# authorized-recipient membership check. The existing gates for
# VerifyAndDecryptArtifact's commitment-required invariant
# (muEnableArtifactCommitmentRequired) and EvaluateArbitration's
# IsCosignatureOf-binding and EscrowNodeSet-independence invariants
# (muEnableWitnessPositionBinding, muEnableWitnessIndependence)
# already ship in 6.2; they are called out in the section header
# below so the Group 6.3 audit scope is readable as a unit even
# though their declarations are shared with 6.2.
#
# Declarations live in artifact_access_mutation_switches.go so
# the audit-v775 runner's line-local rewrite can target exactly
# one declaration per gate. The Group-3 atomic-emission switch
# stays in commitment_atomic.go (already registered there); this
# registry cross-references it without re-declaring.

file: lifecycle/artifact_access_mutation_switches.go
package: github.com/clearcompass-ai/ortholog-sdk/lifecycle

gates:
  # ── artifact_access.go ─────────────────────────────────────────

  - name: muEnableArtifactCommitmentRequired
    kind: bool_const
    description: >-
      (params.Commitments.Threshold() == 0) check inside
      VerifyAndDecryptArtifact's PRE branch. Off bypasses the
      lifecycle-layer rejection; PRE_DecryptFrags still rejects
      empty commitments via its own gate, but the boundary error
      type changes (artifact.ErrEmptyCommitments instead of
      lifecycle.ErrMissingCommitments) and admission diagnostics
      degrade.
    tests:
      - TestVerifyAndDecryptArtifact_PRE_MissingCommitments

  - name: muEnableGrantAuthorizationCheck
    kind: bool_const
    description: >-
      Phase 1 dispatch in GrantArtifactAccess that runs
      CheckGrantAuthorization when SchemaParams.GrantAuthorizationMode
      != GrantAuthOpen. Off treats every grant as open mode
      regardless of schema; restricted / sealed grants no longer
      enforce scope-authority and authorized-recipient
      constraints — silent authorization bypass.
    tests:
      - TestGrantArtifactAccess_AuthCheck_Binding

  # ── recovery.go ────────────────────────────────────────────────

  - name: muEnableWitnessDeserialize
    kind: bool_const
    description: >-
      EvaluateArbitration witness Gate 1 — deserialize errors on
      the witness cosignature envelope are fatal. Off ignores
      deserialize errors; the defensive nil-witnessEntry guard
      still rejects but with a different reason string, so the
      gate-specific "deserialize failed" message no longer
      surfaces. Specific-message assertion is the load-bearing
      signal.
    tests:
      - TestEvaluateArbitration_WitnessDeserialize_Binding

  - name: muEnableWitnessPositionBinding
    kind: bool_const
    description: >-
      EvaluateArbitration witness Gate 2 — the witness cosignature
      MUST reference the RecoveryRequestPos via IsCosignatureOf.
      Off readmits BUG-016-class cross-position cosignature
      acceptance at the arbitration boundary. Bound to the
      pre-existing recovery-test regression.
    tests:
      - TestEvaluateArbitration_RejectsUnboundWitnessCosignature

  - name: muEnableWitnessIndependence
    kind: bool_const
    description: >-
      EvaluateArbitration witness Gate 3 — the witness signer MUST
      NOT appear in EscrowNodeSet. Off lets escrow nodes
      self-witness their own override request, defeating the
      independence requirement schema-declared via
      OverrideRequiresIndependentWitness.
    tests:
      - TestEvaluateArbitration_RejectsEscrowNodeAsWitness

  - name: muEnableReconstructSizeCheck
    kind: bool_const
    description: >-
      (len(keyBytes) != escrow.SecretSize) defensive invariant
      after escrow.Reconstruct returns, factored into
      assertReconstructSize. Off makes the assertion a no-op; a
      primitive-layer contract violation silently propagates
      wrong-size key material into RecoveryResult.MasterKey via
      the copy.
    tests:
      - TestReconstructSizeCheck_Binding

  # ── Group 6.3 — CheckGrantAuthorization internal membership ──

  - name: muEnableGrantAuthoritySetMembership
    kind: bool_const
    description: >-
      Group 6.3. Gates the
      scopeEntry.Header.AuthoritySetContains(GranterDID) check
      inside CheckGrantAuthorization for restricted and sealed
      modes. Off short-circuits the check so every granter passes
      the scope-authority boundary — restricted and sealed modes
      silently collapse to open-mode semantics, producing key
      material for non-authority granters. The binding test drives
      a restricted-mode call with a non-authority granter; with the
      gate on the function rejects with an authority-set reason,
      with the gate off it returns Authorized=true.
    tests:
      - TestCheckGrantAuthorization_AuthoritySetMembership_Binding

  - name: muEnableAuthorizedRecipientMembership
    kind: bool_const
    description: >-
      Group 6.3. Gates the recipient-in-AuthorizedRecipients loop
      inside CheckGrantAuthorization for sealed mode only. Off
      short-circuits the loop so every recipient is admitted and
      sealed mode silently collapses to restricted-mode semantics
      (granter authority still enforced, recipient allowlist no
      longer enforced). Binding test drives a sealed-mode call
      with an in-authority granter but a recipient not in the
      allowlist; gate on → Authorized=false with an
      allowlist-rejection reason; gate off → Authorized=true.
    tests:
      - TestCheckGrantAuthorization_AuthorizedRecipientMembership_Binding
