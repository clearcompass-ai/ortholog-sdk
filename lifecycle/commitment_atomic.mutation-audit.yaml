# Mutation-audit registry for lifecycle/commitment_atomic.go
#
# ADR-005 §4 locks the atomic-emission invariant: every lifecycle
# function returning shares or KFrags also returns a non-nil
# commitment entry. muEnableCommitmentEmissionAtomic gates the
# internal assertion that enforces the invariant. Flipping it false
# disables the assertion and lets a regressed grantUmbralPRE (or
# future lifecycle function) return shares without a commitment.
#
# The binding test drives a full PRE grant and asserts
# result.CommitmentEntry is non-nil; a mutated-false switch would
# also let pathological regressions leak through, which is what the
# assertion exists to catch.

file: lifecycle/commitment_atomic.go
package: github.com/clearcompass-ai/ortholog-sdk/lifecycle

gates:
  - name: muEnableCommitmentEmissionAtomic
    kind: bool_const
    description: >-
      Atomic-emission invariant gate. When true (production),
      AssertAtomicEmission fires when CFrags/shares are non-empty
      and CommitmentEntry is nil. When false, the assertion is a
      no-op. The binding tests construct the pathological
      (material > 0, entry == nil) tuple directly — a state the
      production happy path cannot produce — and assert the error
      fires only while the switch is true.
    tests:
      - TestAtomicEmissionInvariant_FireOnSharesWithoutCommitment
      - TestAtomicEmissionInvariant_PRESide
